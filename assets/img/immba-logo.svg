<svg xmlns="http://www.w3.org/2000/svg" width="520" height="120" viewBox="0 0 520 120" fill="none" role="img" aria-label="imMBA Double Degree English-taught AACSB">
  <defs>
    <style>
      .navy { fill: #0A2540; }
      .navy-stroke { stroke: #0A2540; }
      .gold { fill: #C89D3D; }
      .gold-stroke { stroke: #C89D3D; }
      .teal-stroke { stroke: #1BA6A3; }
      .muted { fill: #4B5563; }
      .txt { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <!-- Icon -->
  <g transform="translate(16,16)">
    <!-- Linked diplomas (double degree) -->
    <path d="M22 26c0-8.8 7.2-16 16-16h18c8.8 0 16 7.2 16 16v4c0 8.8-7.2 16-16 16H38c-8.8 0-16-7.2-16-16v-4Z"
      class="navy-stroke" stroke-width="6" stroke-linejoin="round"/>
    <path d="M44 46c0-8.8 7.2-16 16-16h18c8.8 0 16 7.2 16 16v4c0 8.8-7.2 16-16 16H60c-8.8 0-16-7.2-16-16v-4Z"
      class="navy-stroke" stroke-width="6" stroke-linejoin="round" opacity="0.95"/>

    <!-- Gold ribbon accents -->
    <path d="M28 22h10" class="gold-stroke" stroke-width="6" stroke-linecap="round"/>
    <path d="M78 70h10" class="gold-stroke" stroke-width="6" stroke-linecap="round"/>

    <!-- Globe grid accent -->
    <g transform="translate(66,12)">
      <circle cx="34" cy="34" r="18" class="teal-stroke" stroke-width="4"/>
      <path d="M16 34h36" class="teal-stroke" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
      <path d="M34 16c6 6 6 30 0 36" class="teal-stroke" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
      <path d="M34 16c-6 6-6 30 0 36" class="teal-stroke" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
    </g>
  </g>

  <!-- Text lockup -->
  <g class="txt" transform="translate(152,28)">
    <text x="0" y="26" font-size="34" font-weight="800" class="navy">imMBA</text>
    <text x="0" y="54" font-size="16" font-weight="600" class="muted">Double Degree " English-taught</text>

    <!-- AACSB tag (text only, not an official logo) -->
    <g transform="translate(0,64)">
      <rect x="0" y="0" rx="10" ry="10" width="78" height="26" fill="#0A2540" opacity="0.08"/>
      <rect x="0.75" y="0.75" rx="10" ry="10" width="76.5" height="24.5" fill="none" stroke="#C89D3D" stroke-width="1.5" opacity="0.9"/>
      <text x="14" y="18" font-size="14" font-weight="800" fill="#0A2540">AACSB</text>
    </g>
  </g>
</svg>
