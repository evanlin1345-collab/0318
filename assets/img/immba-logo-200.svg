<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none" role="img" aria-label="imMBA global double degree logo">
  <defs>
    <style>
      .navy { stroke: #0A2540; }
      .gold { stroke: #C89D3D; }
      .teal { stroke: #1BA6A3; }
      .navyFill { fill: #0A2540; }
      .txt { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <!-- Badge rings -->
  <circle cx="100" cy="100" r="86" class="gold" stroke-width="10" opacity="0.95"/>
  <circle cx="100" cy="100" r="72" class="navy" stroke-width="6" opacity="0.8"/>

  <!-- Globe (global element) -->
  <circle cx="100" cy="100" r="44" class="teal" stroke-width="6" opacity="0.95"/>
  <path d="M56 100h88" class="teal" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M100 56c16 16 16 72 0 88" class="teal" stroke-width="4.5" stroke-linecap="round" opacity="0.82"/>
  <path d="M100 56c-16 16-16 72 0 88" class="teal" stroke-width="4.5" stroke-linecap="round" opacity="0.82"/>
  <path d="M70 78c20 12 40 12 60 0" class="teal" stroke-width="4.5" stroke-linecap="round" opacity="0.72"/>
  <path d="M70 122c20-12 40-12 60 0" class="teal" stroke-width="4.5" stroke-linecap="round" opacity="0.72"/>

  <!-- Double-degree hint (linked rings, no infinity) -->
  <g opacity="0.92">
    <circle cx="86" cy="124" r="18" class="navy" stroke-width="8"/>
    <circle cx="114" cy="124" r="18" class="navy" stroke-width="8"/>
  </g>

  <!-- imMBA label -->
  <g class="txt" aria-hidden="true">
    <rect x="52" y="74" width="96" height="28" rx="14" fill="#FFFFFF" opacity="0.95"/>
    <text x="100" y="95" text-anchor="middle" font-size="18" font-weight="900" class="navyFill">imMBA</text>
  </g>
</svg>
