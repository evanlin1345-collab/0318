name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare publish folder
        run: |
          mkdir -p _site/assets/css _site/assets/js _site/assets/img
          cp mockup.html _site/index.html
          cp assets/css/mockup.css _site/assets/css/mockup.css
          cp assets/js/mockup.js _site/assets/js/mockup.js
          if [ -d "assets/img" ]; then cp -r assets/img/* _site/assets/img/; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
